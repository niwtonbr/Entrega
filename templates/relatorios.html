<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Motos | Arquivo Permanente</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --honda-red: #cc0000;
            --dark-bg: #050505;
            --card-bg: #111;
            --accent-blue: #0044ff;
            --text-glow: 0 0 10px rgba(0, 68, 255, 0.5);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            color: white;
        }

        .btn-voltar {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
            border-radius: 4px;
        }

        /* Filtros */
        .filter-bar {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid #222;
            margin-bottom: 25px;
        }

        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; color: #888; text-transform: uppercase; }
        select, input {
            background: #1a1a1a;
            border: 1px solid var(--accent-blue);
            color: white;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }

        .total-vendas {
            margin-left: auto;
            color: var(--accent-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            text-shadow: var(--text-glow);
        }

        /* Cards de Destaque */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .stat-card:hover { border-color: var(--accent-blue); transform: translateY(-5px); }
        .stat-label { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 22px; color: white; display: block; }
        .stat-subtext { color: var(--accent-blue); font-size: 12px; margin-top: 5px; }

        /* Tabela de Ranking */
        .ranking-section {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #222;
        }

        .ranking-title {
            color: var(--accent-blue);
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #888; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 15px; }
        
        .posicao { color: #555; width: 50px; }
        .vendedor-nome { font-weight: bold; }
        .total-venda-num { color: white; text-align: right; }

        tr:first-child td { color: #00ff00; } /* Destaque para o 1º lugar */

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<header>
    <h1>TROPICAL MOTOS | ARQUIVO PERMANENTE</h1>
    <a href="/" class="btn-voltar">← VOLTAR AO PAINEL</a>
</header>

<div class="filter-bar">
    <div class="filter-group">
        <label>Mês</label>
        <select id="mes" onchange="carregarDados()">
            <option value="">Todos</option>
            <option value="01">Janeiro</option><option value="02">Fevereiro</option>
            <option value="03">Março</option><option value="04">Abril</option>
            <option value="05" selected>Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option>
            <option value="09">Setembro</option><option value="10">Outubro</option>
            <option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Ano</label>
        <select id="ano" onchange="carregarDados()">
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026" selected>2026</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Dia (Opcional)</label>
        <input type="date" id="dia" onchange="carregarDados()">
    </div>
    <div class="total-vendas">Total de Vendas: <span id="total-geral">0</span></div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">Moto Mais Vendida</div>
        <div class="stat-value" id="top-moto">-</div>
        <div class="stat-subtext" id="top-moto-count">0 unidades vendidas</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Vendedor Destaque</div>
        <div class="stat-value" id="top-vendedor">-</div>
        <div class="stat-subtext" id="top-vendedor-count">0 Vendas no período</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Cidade com Maior Demanda</div>
        <div class="stat-value" id="top-cidade">-</div>
        <div class="stat-subtext" id="top-cidade-count">0 Motos</div>
    </div>
</div>

<div class="ranking-section">
    <div class="ranking-title">
        <div style="width: 4px; height: 20px; background: var(--accent-blue);"></div>
        RANKING DE VENDEDORES (TOP PERFORMANCE)
    </div>
    <table>
        <thead>
            <tr>
                <th class="posicao">POSIÇÃO</th>
                <th>VENDEDOR</th>
                <th style="text-align: right;">TOTAL DE VENDAS</th>
            </tr>
        </thead>
        <tbody id="ranking-body">
            </tbody>
    </table>
</div>

<script>
    const API_URL = ""; // Deixe vazio se estiver no mesmo servidor

    async function carregarDados() {
        const mes = document.getElementById('mes').value;
        const ano = document.getElementById('ano').value;
        const dia = document.getElementById('dia').value;

        try {
            const response = await fetch(`/get_historico?mes=${mes}&ano=${ano}&dia=${dia}`);
            const dados = await response.json();

            processarEstatisticas(dados);
        } catch (error) {
            console.error("Erro ao buscar dados:", error);
        }
    }

    function processarEstatisticas(vendas) {
        document.getElementById('total-geral').innerText = vendas.length;

        if (vendas.length === 0) {
            limparDashboard();
            return;
        }

        const contagemMotos = {};
        const contagemVendedores = {};
        const contagemCidades = {};

        vendas.forEach(v => {
            contagemMotos[v.modelo] = (contagemMotos[v.modelo] || 0) + 1;
            contagemVendedores[v.vendedor] = (contagemVendedores[v.vendedor] || 0) + 1;
            contagemCidades[v.cidade] = (contagemCidades[v.cidade] || 0) + 1;
        });

        // Encontrar os tops
        const topMoto = Object.entries(contagemMotos).sort((a,b) => b[1] - a[1])[0];
        const topVendedor = Object.entries(contagemVendedores).sort((a,b) => b[1] - a[1])[0];
        const topCidade = Object.entries(contagemCidades).sort((a,b) => b[1] - a[1])[0];

        // Atualizar Cards
        document.getElementById('top-moto').innerText = topMoto[0];
        document.getElementById('top-moto-count').innerText = `${topMoto[1]} unidades vendidas`;

        document.getElementById('top-vendedor').innerText = topVendedor[0];
        document.getElementById('top-vendedor-count').innerText = `${topVendedor[1]} Vendas no período`;

        document.getElementById('top-cidade').innerText = topCidade[0];
        document.getElementById('top-cidade-count').innerText = `${topCidade[1]} Motos`;

        // Gerar Ranking
        const rankingBody = document.getElementById('ranking-body');
        rankingBody.innerHTML = "";
        
        Object.entries(contagemVendedores)
            .sort((a,b) => b[1] - a[1])
            .forEach((vendedor, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="posicao">${index + 1}º</td>
                    <td class="vendedor-nome">${vendedor[0]}</td>
                    <td class="total-venda-num">${vendedor[1]}</td>
                `;
                rankingBody.appendChild(tr);
            });
    }

    function limparDashboard() {
        document.getElementById('top-moto').innerText = "-";
        document.getElementById('top-vendedor').innerText = "-";
        document.getElementById('top-cidade').innerText = "-";
        document.getElementById('ranking-body').innerHTML = "<tr><td colspan='3'>Nenhuma venda encontrada</td></tr>";
    }

    window.onload = carregarDados;
</script>

</body>
</html>
