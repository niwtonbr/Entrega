<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tropical Motos | Arquivo Permanente</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --honda-red: #0723f9; --honda-dark: #092bd5;
            --bg-gradient-1: #0a0a0a; --bg-gradient-2: #1a0505; --bg-gradient-3: #0d0000;
            --glass-bg: rgba(20, 20, 20, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff; --text-secondary: #b0b0b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), #1a0a0a);
            background-size: 400% 400%; animation: gradientShift 15s ease infinite;
            color: var(--text-primary); min-height: 100vh;
        }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        header { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border-bottom: 2px solid var(--honda-red); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #ffffff, var(--honda-red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-btn { padding: 10px 20px; background: transparent; border: 1px solid var(--honda-red); color: white; border-radius: 8px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 12px; }
        .container { padding: 30px; max-width: 1300px; margin: 0 auto; }
        .filter-section { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px; margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: space-between; }
        select, input { padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid var(--honda-red); color: white; border-radius: 8px; font-family: 'Orbitron', monospace; }
        
        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px; text-align: center; }
        .kpi-value { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: bold; color: #fff; text-shadow: 0 0 15px var(--honda-red); }
        .kpi-detail { font-size: 14px; color: var(--honda-red); margin-top: 10px; font-weight: bold; }
        
        .top3-list { list-style: none; padding: 0; margin: 15px 0; text-align: left; }
        .top3-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Orbitron', monospace; font-size: 13px; }
        .top3-item span { color: var(--text-secondary); }
        .top3-item b { color: white; text-shadow: 0 0 5px var(--honda-red); }

        .report-table-container { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; margin-bottom: 30px;}
        .scroll-area { max-height: 420px; overflow-y: auto; margin-top: 20px; border-radius: 10px; }
        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--honda-red); border-radius: 10px; }

        h2 { font-family: 'Orbitron', monospace; color: var(--honda-red); margin-bottom: 20px; text-transform: uppercase; font-size: 18px; border-left: 5px solid var(--honda-red); padding-left: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: linear-gradient(135deg, var(--honda-red), var(--honda-dark)); color: white; padding: 15px; text-align: left; text-transform: uppercase; font-family: 'Orbitron', monospace; font-size: 12px; position: sticky; top: 0; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-secondary); }
        .badge-color { padding: 5px 12px; border-radius: 6px; font-weight: bold; font-size: 11px; color: #fff; display: inline-block; min-width: 120px; text-align: center; text-transform: uppercase; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .chart-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 20px; border-radius: 20px; height: 400px; }
    </style>
</head>
<body>

<header>
    <span class="logo-text">TROPICAL MOTOS | ANALYTICS</span>
    <button class="nav-btn" onclick="window.location.href='/'">⬅ VOLTAR AO PAINEL</button>
</header>

<div class="container">
    <div class="filter-section">
        <div style="display: flex; gap: 15px; align-items: center;">
            <div style="display:flex; flex-direction:column; gap:5px">
                <label style="font-family: 'Orbitron'; font-size: 10px;">MÊS</label>
                <select id="filtro-mes" onchange="gerarRelatorio()">
                    <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
                    <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                    <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                    <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
            </div>
            <div style="display:flex; flex-direction:column; gap:5px">
                <label style="font-family: 'Orbitron'; font-size: 10px;">ANO</label>
                <select id="filtro-ano" onchange="gerarRelatorio()">
                    <option value="2024">2024</option><option value="2025" selected>2025</option><option value="2026">2026</option>
                </select>
            </div>
            <div style="display:flex; flex-direction:column; gap:5px">
                <label style="font-family: 'Orbitron'; font-size: 10px;">DIA</label>
                <input type="date" id="filtro-dia" onchange="gerarRelatorio()">
            </div>
        </div>
        <div id="total-geral" style="font-family: 'Orbitron'; color: var(--honda-red); font-weight: bold;">Total: 0</div>
    </div>

    <div class="kpi-container">
        <div class="kpi-card">
            <h3 style="font-family:'Orbitron'; font-size:14px; color:var(--text-secondary)">Top 3 Modelos</h3>
            <div id="top-modelos-list" class="top3-list"></div>
            <div class="kpi-detail" id="total-modelos">0 Unidades</div>
        </div>
        <div class="kpi-card">
            <h3 style="font-family:'Orbitron'; font-size:14px; color:var(--text-secondary)">Top 3 Vendedores</h3>
            <div id="top-vendedores-list" class="top3-list"></div>
            <div class="kpi-detail" id="total-vendas-vendedor">0 Vendas no total</div>
        </div>
        <div class="kpi-card">
            <h3 style="font-family:'Orbitron'; font-size:14px; color:var(--text-secondary)">Top 3 Cidades</h3>
            <div id="top-cidades-list" class="top3-list"></div>
            <div class="kpi-detail" id="total-cidades">0 Motos</div>
        </div>
    </div>

    <div class="report-table-container">
        <h2>Ranking Completo de Vendedores</h2>
        <div class="scroll-area">
            <table>
                <thead>
                    <tr>
                        <th>Posição</th>
                        <th>Vendedor</th>
                        <th style="text-align:center">Vendas</th>
                    </tr>
                </thead>
                <tbody id="tabela-ranking"></tbody>
            </table>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card"><h2>Vendas por Vendedor</h2><canvas id="chartBarras"></canvas></div>
        <div class="chart-card"><h2>Distribuição de Modelos</h2><canvas id="chartPizza"></canvas></div>
    </div>
</div>

<script>
    const API_URL = ""; 
    let myBarChart = null, myPieChart = null;

    async function gerarRelatorio() {
        const mes = document.getElementById('filtro-mes').value;
        const ano = document.getElementById('filtro-ano').value;
        const dia = document.getElementById('filtro-dia').value;

        try {
            const res = await fetch(`${API_URL}/get_historico?mes=${mes}&ano=${ano}&dia=${dia}`);
            const vendas = await res.json();
            document.getElementById('total-geral').innerText = `Total: ${vendas.length}`;
            if(vendas.length === 0) { limparKpis(); return; }
            processarDados(vendas);
        } catch (e) { console.error(e); }
    }

    function limparKpis() {
        document.getElementById('top-modelos-list').innerHTML = "";
        document.getElementById('top-vendedores-list').innerHTML = "";
        document.getElementById('top-cidades-list').innerHTML = "";
        document.getElementById('total-modelos').innerText = "0 Unidades";
        document.getElementById('total-vendas-vendedor').innerText = "0 Vendas";
        document.getElementById('total-cidades').innerText = "0 Motos";
        document.getElementById('tabela-ranking').innerHTML = "";
    }

    function processarDados(vendas) {
        const modCount = {}, venCount = {}, cidCount = {};
        vendas.forEach(v => {
            modCount[v.modelo] = (modCount[v.modelo] || 0) + 1;
            venCount[v.vendedor] = (venCount[v.vendedor] || 0) + 1;
            cidCount[v.cidade] = (cidCount[v.cidade] || 0) + 1;
        });

        const createTop3 = (countObj, elementId) => {
            const sorted = Object.entries(countObj).sort((a, b) => b[1] - a[1]).slice(0, 3);
            const listDiv = document.getElementById(elementId);
            listDiv.innerHTML = "";
            sorted.forEach(([name, val], i) => {
                listDiv.innerHTML += `<div class="top3-item"><span>${i+1}º ${name}</span><b>${val}</b></div>`;
            });
            return sorted;
        };

        createTop3(modCount, 'top-modelos-list');
        createTop3(venCount, 'top-vendedores-list');
        createTop3(cidCount, 'top-cidades-list');

        document.getElementById('total-modelos').innerText = `${vendas.length} Unidades`;
        document.getElementById('total-vendas-vendedor').innerText = `${vendas.length} Vendas no total`;
        document.getElementById('total-cidades').innerText = `${vendas.length} Motos`;

        const rankingArray = Object.keys(venCount).map(name => ({ name, total: venCount[name] }));
        rankingArray.sort((a, b) => b.total - a.total);

        const tbody = document.getElementById('tabela-ranking');
        tbody.innerHTML = "";
        rankingArray.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${index+1}º</td><td style="font-weight:bold; color:white">${item.name}</td><td style="text-align:center">${item.total}</td>`;
            tbody.appendChild(tr);
        });

        renderCharts(rankingArray, modCount);
    }

    function renderCharts(rankingData, modelData) {
        const ctxBar = document.getElementById('chartBarras').getContext('2d');
        const ctxPie = document.getElementById('chartPizza').getContext('2d');
        if (myBarChart) myBarChart.destroy(); if (myPieChart) myPieChart.destroy();

        // Paleta de cores neon para as barras
        const colors = ['#FF0055', '#00FFCC', '#FFFF00', '#00FF00', '#FF00FF', '#00FFFF', '#FFA500', '#800080', '#FFFFFF', '#C0C0C0'];
        const barColors = rankingData.map((_, i) => colors[i % colors.length]);

        myBarChart = new Chart(ctxBar, {
            type: 'bar',
            data: { labels: rankingData.map(d => d.name), datasets: [{ label: 'Vendas', data: rankingData.map(d => d.total), backgroundColor: barColors }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } }, x: { ticks: { color: '#fff' } } }, plugins: { legend: { display: false } } }
        });

        myPieChart = new Chart(ctxPie, {
            type: 'pie',
            data: { labels: Object.keys(modelData), datasets: [{ data: Object.values(modelData), backgroundColor: colors }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });
    }

    window.onload = () => {
        const agora = new Date();
        document.getElementById('filtro-mes').value = String(agora.getMonth() + 1).padStart(2, '0');
        document.getElementById('filtro-ano').value = agora.getFullYear();
        gerarRelatorio();
    };
</script>
</body>
</html>
