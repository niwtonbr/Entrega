<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão Tropical Motos | Relatório</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .header-gestao { background: #1a237e; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .filtros { background: white; padding: 20px; border-radius: 8px; display: flex; gap: 10px; align-items: flex-end; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #f8f8f8; }
        .btn-blue { background: #1a237e; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-gestao">
    <h1>Relatórios de Vendas (Arquivo CSV)</h1>
    <button class="btn-blue" style="background: #fff; color: #1a237e;" onclick="window.location.href='/'">Voltar ao Painel</button>
</div>

<div class="filtros">
    <div>
        <label>Mês (01-12):</label><br>
        <input type="text" id="mes" placeholder="Ex: 05" style="width: 50px; padding: 8px;">
    </div>
    <div>
        <label>Ano:</label><br>
        <input type="text" id="ano" placeholder="Ex: 2026" style="width: 80px; padding: 8px;">
    </div>
    <button class="btn-blue" onclick="filtrarRelatorio()">Filtrar Histórico</button>
</div>

<table id="tabela-relatorio">
    <thead>
        <tr>
            <th>Data</th>
            <th>Modelo</th>
            <th>Cor</th>
            <th>Vendedor</th>
            <th>Cidade</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    async function filtrarRelatorio() {
        const mes = document.getElementById('mes').value;
        const ano = document.getElementById('ano').value;
        
        // Monta a URL com os parâmetros que o seu Python espera
        const url = `/get_historico?mes=${mes}&ano=${ano}`;
        
        try {
            const response = await fetch(url);
            const dados = await response.json();
            const tbody = document.querySelector("#tabela-relatorio tbody");
            tbody.innerHTML = "";

            dados.forEach(item => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${item.data}</td>
                    <td>${item.modelo}</td>
                    <td>${item.cor}</td>
                    <td>${item.vendedor}</td>
                    <td>${item.cidade}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            console.error("Erro ao carregar relatório:", e);
        }
    }

    // Carrega tudo ao abrir a página pela primeira vez
    window.onload = filtrarRelatorio;
</script>
</body>
</html>
